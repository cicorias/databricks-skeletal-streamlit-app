bundle:
  name: databricks-sales-appkit

variables:
  sql_warehouse_id:
    description: SQL Warehouse ID
  files_path:
    description: Volume path for file storage (e.g. /Volumes/catalog/schema/volume_name)
  files_id:
    description: Permission to write to volumes
  genie_space_id:
    description: Default Genie Space ID
  genie_space_name:
    description: Genie Space for AI-powered data queries. Space IDs configured via plugin config.
  postgres_branch:
    description: Full Lakebase Postgres branch resource name. Obtain by running `databricks postgres list-branches projects/{project-id}`, select the desired item from the output array and use its .name value.
  postgres_database:
    description: Full Lakebase Postgres database resource name. Obtain by running `databricks postgres list-databases {branch-name}`, select the desired item from the output array and use its .name value. Requires the branch resource name.
  serving_endpoint_name:
    description: Serving endpoint name


include:
  - databricks.local.yml

sync:
  exclude:
    - "node_modules/**"
    - "dist/**"
    - "client/dist/**"
    - ".smoke-test/**"
    - "test-results/**"
    - "playwright-report/**"
    - ".env"

resources:
  apps:
    sales_appkit:
      name: ${var.app_name}
      description: Sales Review Portal — AppKit on Databricks Apps
      source_code_path: .
      user_api_scopes:
        - dashboards.genie
        - files.files
        - serving.serving-endpoints

      # The resources which this app has access to.
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE
        - name: files
          uc_securable:
            securable_full_name: ${var.files_id}
            securable_type: VOLUME
            permission: WRITE_VOLUME
        - name: genie-space
          genie_space:
            name: ${var.genie_space_name}
            space_id: ${var.genie_space_id}
            permission: CAN_RUN
        - name: postgres
          postgres:
            branch: ${var.postgres_branch}
            database: ${var.postgres_database}
            permission: CAN_CONNECT_AND_CREATE
        - name: serving-endpoint
          serving_endpoint:
            name: ${var.serving_endpoint_name}
            permission: CAN_QUERY

targets:
  dev:
    mode: development
    default: true
